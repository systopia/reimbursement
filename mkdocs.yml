site_name: reimbursement
site_description: Manage reimbursements.
site_author: SYSTOPIA GmbH
repo_url: https://github.com/systopia/reimbursement

theme:
  name: material

nav:
  - Introduction: index.md
  - Installation: installation.md
  - Features: features.md
  - Components of an Application Workflow: components.md
  - Usage: usage.md
  - Configuration: configuration.md

markdown_extensions:
  - attr_list
  - admonition
  - def_list
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tilde
  - pymdownx.betterem
  - pymdownx.mark

plugins:
  - search:
      lang: en
